<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Quick Percentage Calculator</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="wrap">
    <!-- Header -->
    <div class="headerGlass">
      <h1>Quick Percentage Calculator</h1>

      <div class="tabs">
        <button class="tab active" id="tab-discount" type="button">Discount</button>
        <button class="tab" id="tab-between" type="button">Find %</button>
      </div>
    </div>

    <!-- Discount tab -->
    <section id="panel-discount" class="panel active">
      <div class="headerGlass">
        <label class="label">Amount</label>
        <input id="amount" type="number" inputmode="decimal" placeholder="e.g. 200">

        <div class="spacer"></div>

        <label class="label">Quick %</label>
        <div class="buttons" id="buttons"></div>

        <div class="spacer"></div>

        <label class="label">Custom %</label>
        <input id="customPct" type="number" inputmode="decimal" placeholder="e.g. 17.5">

        <div class="resultRow">
          <div class="result" id="result">—</div>
          <button id="copyBtn" class="copyBtn" type="button">Copy</button>
        </div>

        <div class="status" id="status">Enter an amount and pick a %.</div>
      </div>
    </section>

    <!-- Find % tab -->
    <section id="panel-between" class="panel">
      <div class="headerGlass">
        <label class="label">Part (A)</label>
        <input id="part" type="number" inputmode="decimal" placeholder="e.g. 25">

        <div class="spacer"></div>

        <label class="label">Total (B)</label>
        <input id="total" type="number" inputmode="decimal" placeholder="e.g. 200">

        <div class="resultRow">
          <div class="result" id="betweenResult">—</div>
        </div>

        <div class="status" id="betweenStatus">Enter A and B to calculate.</div>
      </div>
    </section>

  </div> <!-- ✅ close .wrap -->

  <script src="popup.js"></script>
</body>
</html>
